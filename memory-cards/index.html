<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Memory Cards</title>
<style>
:root{
  --bg:#f0f2f7;--bg2:#fff;--bg3:#e4e8f0;--bg4:#f7f8fb;
  --text:#1a1d2e;--text2:#5a6078;--text3:#9098b0;
  --accent:#6c63ff;--accent2:#ff6b9d;--green:#0ea574;--red:#e53e3e;--gold:#f59e0b;
  --border:rgba(0,0,0,0.06);--shadow:0 8px 32px rgba(0,0,0,0.08);
  --card-bg:linear-gradient(135deg,#6c63ff,#a855f7);
  --radius:16px;--tr:0.3s ease;
}
.dark{
  --bg:#0c0e18;--bg2:#161a2a;--bg3:#1e2438;--bg4:#1a1f30;
  --text:#e8ecf4;--text2:#8a92b0;--text3:#5a6278;
  --border:rgba(255,255,255,0.06);--shadow:0 8px 32px rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--tr),color var(--tr);overflow-x:hidden}
.app{max-width:600px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0}
.game-header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:6px}
.hdr-actions{display:flex;gap:6px}
.ibtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--tr)}
.ibtn:hover{border-color:var(--accent);color:var(--accent)}

/* Screens */
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}

/* Menu */
.menu{align-items:center;justify-content:center;text-align:center;gap:20px;padding:20px 0}
.menu-title{font-size:clamp(32px,7vw,48px);font-weight:800;margin-bottom:4px}
.menu-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.menu-sub{color:var(--text2);font-size:14px;margin-bottom:16px}
.menu-emoji{font-size:64px;margin-bottom:8px}

.diff-grid{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.diff-btn{padding:16px 20px;border-radius:14px;border:2px solid var(--border);background:var(--bg2);cursor:pointer;transition:all var(--tr);text-align:left;display:flex;align-items:center;justify-content:space-between}
.diff-btn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.diff-name{font-size:16px;font-weight:700}
.diff-info{font-size:12px;color:var(--text3)}
.diff-badge{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
.diff-btn[data-d="easy"] .diff-badge{background:rgba(14,165,116,0.1);color:var(--green)}
.diff-btn[data-d="medium"] .diff-badge{background:rgba(245,158,11,0.1);color:var(--gold)}
.diff-btn[data-d="hard"] .diff-badge{background:rgba(229,62,62,0.1);color:var(--red)}

.menu-footer{display:flex;gap:10px;margin-top:12px}
.menu-link{padding:10px 20px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--tr)}
.menu-link:hover{border-color:var(--accent);color:var(--accent)}

/* Stats bar */
.stats-bar{display:flex;gap:6px;margin-bottom:14px;flex-shrink:0;flex-wrap:wrap}
.stat{flex:1;min-width:70px;padding:10px 8px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);text-align:center;transition:all var(--tr)}
.stat-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.stat-val.accent{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-val.gold{color:var(--gold)}
.stat-val.red{color:var(--red)}

/* Combo */
.combo-bar{height:32px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0}
.combo-text{font-size:18px;font-weight:800;opacity:0;transition:all 0.3s;transform:scale(0.5)}
.combo-text.show{opacity:1;transform:scale(1)}
.combo-text.x2{color:var(--gold)}
.combo-text.x3{color:var(--accent2)}
.combo-text.x4{color:var(--red)}

/* Grid */
.grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 0}
.card-grid{display:grid;gap:8px;width:100%;max-width:480px;margin:0 auto}
.card-grid.easy{grid-template-columns:repeat(4,1fr)}
.card-grid.medium{grid-template-columns:repeat(4,1fr)}
.card-grid.hard{grid-template-columns:repeat(6,1fr)}

/* Card */
.card-cell{aspect-ratio:3/4;perspective:600px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d}
.card-cell.flipped .card-inner,.card-cell.matched .card-inner{transform:rotateY(180deg)}
.card-cell.matched .card-inner{animation:matchPulse 0.5s ease}
.card-cell.wrong .card-inner{animation:shake 0.4s ease}
.card-face{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-size:clamp(24px,6vw,40px);border:2px solid transparent}
.card-back{background:var(--card-bg);box-shadow:0 4px 16px rgba(108,99,255,0.2);z-index:1}
.card-back::after{content:'?';color:rgba(255,255,255,0.3);font-size:clamp(20px,5vw,32px);font-weight:800}
.card-front{transform:rotateY(180deg);background:var(--bg2);border:2px solid var(--border);box-shadow:var(--shadow)}
.card-cell.matched .card-front{border-color:var(--green);box-shadow:0 0 20px rgba(14,165,116,0.2)}
.card-cell.locked{pointer-events:none}

@keyframes matchPulse{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.08)}100%{transform:rotateY(180deg) scale(1)}}
@keyframes shake{0%,100%{transform:rotateY(180deg) translateX(0)}25%{transform:rotateY(180deg) translateX(-6px)}75%{transform:rotateY(180deg) translateX(6px)}}

/* Game controls */
.game-controls{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-shrink:0;padding-bottom:8px}
.ctrl-btn{padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--tr);display:flex;align-items:center;gap:6px}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn.hint-btn{position:relative}
.hint-count{background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* Countdown */
.countdown-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(8px)}
.countdown-overlay.show{display:flex}
.countdown-num{font-size:120px;font-weight:800;color:#fff;animation:countPop 0.8s ease;text-shadow:0 4px 40px rgba(108,99,255,0.5)}
@keyframes countPop{0%{transform:scale(2);opacity:0}50%{transform:scale(0.9);opacity:1}100%{transform:scale(1)}}

/* Win screen */
.win{align-items:center;justify-content:center;text-align:center;gap:12px;padding:20px}
.win-title{font-size:36px;font-weight:800;color:var(--green)}
.win-score{font-size:56px;font-weight:200;color:var(--accent);margin:8px 0}
.win-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:360px;margin-bottom:16px}
.win-stat{padding:12px;border-radius:12px;background:var(--bg2);border:1px solid var(--border)}
.win-stat-val{font-size:22px;font-weight:700}
.win-stat-label{font-size:11px;color:var(--text3)}
.name-input-wrap{display:flex;gap:8px;width:100%;max-width:300px}
.name-input{flex:1;padding:12px 16px;border-radius:12px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;outline:none;transition:border-color var(--tr)}
.name-input:focus{border-color:var(--accent)}
.save-score-btn{padding:12px 20px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all var(--tr)}
.save-score-btn:hover{filter:brightness(1.1)}
.win-actions{display:flex;gap:10px;margin-top:8px}

/* Scores */
.scores{padding:20px 0}
.scores-tabs{display:flex;gap:6px;margin-bottom:16px}
.scores-tab{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:13px;font-weight:600;text-align:center;transition:all var(--tr);color:var(--text2)}
.scores-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.score-table{width:100%;border-collapse:collapse}
.score-table th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:8px;text-align:left;font-weight:600}
.score-table td{padding:10px 8px;border-top:1px solid var(--border);font-size:13px}
.score-rank{font-weight:800;color:var(--accent);width:30px}
.score-name{font-weight:600}
.score-pts{font-weight:700;color:var(--gold)}
.no-scores{text-align:center;color:var(--text3);padding:30px;font-size:14px}
.reset-scores{margin-top:12px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);cursor:pointer;font-size:12px;transition:all var(--tr)}
.reset-scores:hover{border-color:var(--red);color:var(--red)}

/* Confetti */
.confetti-piece{position:fixed;width:10px;height:10px;z-index:200;pointer-events:none;border-radius:2px}

/* Achievements toast */
.achieve-toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:14px;background:var(--bg2);border:1px solid var(--gold);box-shadow:0 8px 30px rgba(0,0,0,0.15);z-index:100;transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;max-width:280px}
.achieve-toast.show{transform:translateX(0)}
.achieve-icon{font-size:24px}

@media(max-width:420px){
  .stats-bar{gap:4px}
  .stat{padding:8px 4px;min-width:60px}
  .stat-val{font-size:16px}
  .card-grid.hard{gap:5px}
}
</style>
</head>
<body>
<div class="app">
  <div class="game-header">
    <h1>🧠 Memory</h1>
    <div class="hdr-actions">
      <button class="ibtn" id="btnTheme" title="Tema">&#9789;</button>
    </div>
  </div>

  <!-- MENU -->
  <div class="screen active" id="screenMenu">
    <div class="menu">
      <div class="menu-emoji">🃏</div>
      <div class="menu-title"><span>Memory Cards</span></div>
      <div class="menu-sub">Encuentra todos los pares. ¿Qué tan buena es tu memoria?</div>
      <div class="diff-grid">
        <button class="diff-btn" data-d="easy"><div><div class="diff-name">Fácil</div><div class="diff-info">4 pares · Grid 2×4</div></div><span class="diff-badge">EASY</span></button>
        <button class="diff-btn" data-d="medium"><div><div class="diff-name">Intermedio</div><div class="diff-info">8 pares · Grid 4×4</div></div><span class="diff-badge">MEDIUM</span></button>
        <button class="diff-btn" data-d="hard"><div><div class="diff-name">Difícil</div><div class="diff-info">12 pares · Grid 4×6</div></div><span class="diff-badge">HARD</span></button>
      </div>
      <div class="menu-footer">
        <button class="menu-link" id="btnShowScores">🏆 High Scores</button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen" id="screenGame">
    <div class="stats-bar">
      <div class="stat"><div class="stat-val accent" id="sTime">0:00</div><div class="stat-label">Tiempo</div></div>
      <div class="stat"><div class="stat-val" id="sMoves">0</div><div class="stat-label">Movimientos</div></div>
      <div class="stat"><div class="stat-val green" id="sPairs">0/0</div><div class="stat-label">Pares</div></div>
      <div class="stat"><div class="stat-val gold" id="sScore">0</div><div class="stat-label">Puntos</div></div>
      <div class="stat"><div class="stat-val" id="sCombo">x1</div><div class="stat-label">Combo</div></div>
    </div>
    <div class="combo-bar"><div class="combo-text" id="comboText"></div></div>
    <div class="grid-wrap"><div class="card-grid" id="cardGrid"></div></div>
    <div class="game-controls">
      <button class="ctrl-btn" id="btnMenu">&#9664; Menú</button>
      <button class="ctrl-btn hint-btn" id="btnHint">💡 Pista <span class="hint-count" id="hintCount">3</span></button>
      <button class="ctrl-btn" id="btnRestart">&#8635; Reiniciar</button>
    </div>
  </div>

  <!-- WIN -->
  <div class="screen" id="screenWin">
    <div class="win">
      <div style="font-size:48px">🎉</div>
      <div class="win-title" id="winTitle">¡Victoria!</div>
      <div class="win-score" id="winScore">0</div>
      <div style="font-size:13px;color:var(--text2)">puntos</div>
      <div class="win-stats">
        <div class="win-stat"><div class="win-stat-val" id="winTime">0:00</div><div class="win-stat-label">Tiempo</div></div>
        <div class="win-stat"><div class="win-stat-val" id="winMoves">0</div><div class="win-stat-label">Movimientos</div></div>
        <div class="win-stat"><div class="win-stat-val" id="winAccuracy">0%</div><div class="win-stat-label">Precisión</div></div>
      </div>
      <div class="name-input-wrap">
        <input class="name-input" id="nameInput" placeholder="Tu nombre" maxlength="15">
        <button class="save-score-btn" id="btnSaveScore">Guardar</button>
      </div>
      <div class="win-actions">
        <button class="ctrl-btn" id="winMenu">&#9664; Menú</button>
        <button class="ctrl-btn" id="winReplay">&#8635; Jugar de nuevo</button>
      </div>
    </div>
  </div>

  <!-- SCORES -->
  <div class="screen" id="screenScores">
    <div class="scores">
      <div class="scores-tabs">
        <button class="scores-tab active" data-sd="easy">Fácil</button>
        <button class="scores-tab" data-sd="medium">Intermedio</button>
        <button class="scores-tab" data-sd="hard">Difícil</button>
      </div>
      <table class="score-table" id="scoreTable"><thead><tr><th>#</th><th>Nombre</th><th>Puntos</th><th>Tiempo</th><th>Mov.</th></tr></thead><tbody id="scoreBody"></tbody></table>
      <div class="no-scores" id="noScores">Aún no hay puntuaciones</div>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:center">
        <button class="ctrl-btn" id="scoresBack">&#9664; Volver</button>
        <button class="reset-scores" id="btnResetScores">Resetear scores</button>
      </div>
    </div>
  </div>
</div>

<div class="countdown-overlay" id="countdown"><div class="countdown-num" id="countNum">3</div></div>
<div class="achieve-toast" id="achieveToast"><span class="achieve-icon" id="achieveIcon">🏆</span><span id="achieveText"></span></div>

<script>
(()=>{
  // ============ CONFIG ============
  const THEMES=[
    ['🐶','🐱','🐼','🦊','🐸','🦄','🌟','💎','🦋','🐙','🍄','🔮'],
    ['🍎','🍊','🍋','🍇','🍉','🍓','🥝','🍑','🫐','🥭','🍒','🌶️'],
    ['🚀','🎸','🎮','🧩','🎯','🎪','🏆','🎭','🎨','🎬','🎹','🎲'],
  ];
  const DIFFICULTIES={easy:{pairs:4,cols:4,rows:2},medium:{pairs:8,cols:4,rows:4},hard:{pairs:12,cols:6,rows:4}};
  const ACHIEVEMENTS={firstWin:'🏆 Primera Victoria',perfect:'💯 Precisión Perfecta',speedrun:'⚡ Velocista (< 30s)',combo4:'🔥 Combo x4',hardWin:'🧠 Maestro (Difícil)',tenGames:'🎮 10 Partidas'};

  // ============ STATE ============
  let diff='easy',cards=[],flipped=[],matched=0,moves=0,score=0,combo=1,maxCombo=1;
  let timer=0,timerInterval=null,gameActive=false,locked=false,hints=3,totalPairs=4;
  let scores=JSON.parse(localStorage.getItem('memScores')||'{"easy":[],"medium":[],"hard":[]}');
  let stats=JSON.parse(localStorage.getItem('memStats')||'{"gamesPlayed":0,"achievements":[]}');
  let dark=localStorage.getItem('memDark')==='true';
  let scoreDiff='easy';

  // ============ AUDIO ============
  const AC=window.AudioContext||window.webkitAudioContext;let ac;
  function ea(){if(!ac)ac=new AC()}
  function snd(f,d,t='sine',v=0.06){try{ea();const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
  function sndFlip(){snd(600,0.08);snd(900,0.06)}
  function sndMatch(){[0,80,160].forEach((d,i)=>setTimeout(()=>snd(700+i*200,0.12,'sine',0.05),d))}
  function sndFail(){snd(250,0.15,'sawtooth',0.04);setTimeout(()=>snd(200,0.2,'sawtooth',0.04),80)}
  function sndWin(){[0,100,200,300,400].forEach((d,i)=>setTimeout(()=>snd(500+i*150,0.2,'sine',0.05),d))}

  // ============ DOM ============
  const $=id=>document.getElementById(id);
  const screens={menu:$('screenMenu'),game:$('screenGame'),win:$('screenWin'),scores:$('screenScores')};
  function showScreen(name){Object.values(screens).forEach(s=>s.classList.remove('active'));screens[name].classList.add('active')}

  // ============ THEME ============
  function applyTheme(){document.body.classList.toggle('dark',dark);$('btnTheme').innerHTML=dark?'&#9788;':'&#9789;'}
  $('btnTheme').addEventListener('click',()=>{dark=!dark;applyTheme();localStorage.setItem('memDark',dark.toString())});

  // ============ MENU ============
  document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',()=>{diff=b.dataset.d;startGame()}));
  $('btnShowScores').addEventListener('click',()=>{scoreDiff='easy';renderScores();showScreen('scores')});
  $('btnMenu').addEventListener('click',()=>{stopTimer();showScreen('menu')});
  $('btnRestart').addEventListener('click',()=>startGame());
  $('winMenu').addEventListener('click',()=>showScreen('menu'));
  $('winReplay').addEventListener('click',()=>startGame());
  $('scoresBack').addEventListener('click',()=>showScreen('menu'));

  document.querySelectorAll('.scores-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.scores-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    scoreDiff=t.dataset.sd;renderScores();
  }));

  $('btnResetScores').addEventListener('click',()=>{
    if(confirm('¿Resetear todos los high scores?')){scores={easy:[],medium:[],hard:[]};localStorage.setItem('memScores',JSON.stringify(scores));renderScores()}
  });

  // ============ GAME ============
  function startGame(){
    ea();
    const cfg=DIFFICULTIES[diff];
    totalPairs=cfg.pairs;matched=0;moves=0;score=0;combo=1;maxCombo=1;timer=0;hints=3;locked=true;gameActive=false;
    flipped=[];
    $('hintCount').textContent=hints;
    updateStats();

    // Pick theme
    const theme=THEMES[Math.floor(Math.random()*THEMES.length)];
    const symbols=shuffle([...theme]).slice(0,totalPairs);
    cards=shuffle([...symbols,...symbols].map((s,i)=>({id:i,symbol:s,matched:false})));

    // Render grid
    const grid=$('cardGrid');
    grid.className='card-grid '+diff;
    grid.innerHTML='';
    cards.forEach((c,i)=>{
      const cell=document.createElement('div');
      cell.className='card-cell';
      cell.dataset.idx=i;
      cell.innerHTML=`<div class="card-inner"><div class="card-face card-back"></div><div class="card-face card-front">${c.symbol}</div></div>`;
      cell.addEventListener('click',()=>flipCard(i));
      grid.appendChild(cell);
    });

    showScreen('game');
    runCountdown();
  }

  function runCountdown(){
    const ov=$('countdown');const num=$('countNum');
    ov.classList.add('show');
    let count=3;
    num.textContent=count;
    const iv=setInterval(()=>{
      count--;
      if(count>0){num.textContent=count;num.style.animation='none';void num.offsetWidth;num.style.animation='countPop 0.8s ease'}
      else if(count===0){num.textContent='GO!';num.style.color='var(--green)';num.style.animation='none';void num.offsetWidth;num.style.animation='countPop 0.8s ease'}
      else{clearInterval(iv);ov.classList.remove('show');num.style.color='';locked=false;gameActive=true;startTimer()}
    },800);
  }

  function flipCard(idx){
    if(locked||!gameActive)return;
    const card=cards[idx];
    const cell=document.querySelectorAll('.card-cell')[idx];
    if(card.matched||flipped.includes(idx))return;

    sndFlip();
    cell.classList.add('flipped');
    flipped.push(idx);

    if(flipped.length===2){
      locked=true;moves++;
      const[a,b]=flipped;
      if(cards[a].symbol===cards[b].symbol){
        // Match!
        setTimeout(()=>{
          sndMatch();
          const cells=document.querySelectorAll('.card-cell');
          cells[a].classList.add('matched');cells[b].classList.add('matched');
          cards[a].matched=true;cards[b].matched=true;
          matched++;

          // Scoring
          const basePoints=100;
          const comboBonus=basePoints*combo;
          score+=comboBonus;
          combo++;if(combo>maxCombo)maxCombo=combo;

          showCombo(combo-1);
          updateStats();
          flipped=[];locked=false;

          if(matched===totalPairs)endGame();
        },300);
      }else{
        // No match
        combo=1;
        setTimeout(()=>{
          sndFail();
          const cells=document.querySelectorAll('.card-cell');
          cells[a].classList.add('wrong');cells[b].classList.add('wrong');
          setTimeout(()=>{
            cells[a].classList.remove('flipped','wrong');
            cells[b].classList.remove('flipped','wrong');
            flipped=[];locked=false;
            updateStats();
          },600);
        },700);
      }
    }
  }

  function showCombo(c){
    const el=$('comboText');
    if(c>=2){
      el.textContent=c>=4?`🔥 COMBO x${c}!`:c>=3?`⚡ COMBO x${c}!`:`✨ COMBO x${c}!`;
      el.className='combo-text show'+(c>=4?' x4':c>=3?' x3':' x2');
      setTimeout(()=>el.classList.remove('show'),1200);
    }
  }

  // ============ HINTS ============
  $('btnHint').addEventListener('click',()=>{
    if(hints<=0||!gameActive||locked)return;
    hints--;$('hintCount').textContent=hints;
    locked=true;
    const cells=document.querySelectorAll('.card-cell');
    cells.forEach(c=>{if(!c.classList.contains('matched'))c.classList.add('flipped')});
    setTimeout(()=>{
      cells.forEach(c=>{if(!c.classList.contains('matched'))c.classList.remove('flipped')});
      locked=false;
    },1500);
    score=Math.max(0,score-50);
    updateStats();
  });

  // ============ TIMER ============
  function startTimer(){stopTimer();timer=0;timerInterval=setInterval(()=>{timer++;$('sTime').textContent=fmtTime(timer)},1000)}
  function stopTimer(){clearInterval(timerInterval)}
  function fmtTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}

  // ============ STATS ============
  function updateStats(){
    $('sMoves').textContent=moves;
    $('sPairs').textContent=matched+'/'+totalPairs;
    $('sScore').textContent=score;
    $('sCombo').textContent='x'+combo;
    $('sCombo').style.color=combo>=3?'var(--accent2)':combo>=2?'var(--gold)':'';
  }

  // ============ END GAME ============
  function endGame(){
    stopTimer();gameActive=false;sndWin();

    // Time bonus
    const timeBonus=Math.max(0,Math.floor((300-timer)*2));
    // Accuracy
    const accuracy=Math.round((totalPairs/moves)*100);
    const accBonus=accuracy>=80?accuracy*2:0;
    score+=timeBonus+accBonus;

    stats.gamesPlayed++;
    localStorage.setItem('memStats',JSON.stringify(stats));

    setTimeout(()=>{
      $('winScore').textContent=score;
      $('winTime').textContent=fmtTime(timer);
      $('winMoves').textContent=moves;
      $('winAccuracy').textContent=accuracy+'%';
      $('nameInput').value=localStorage.getItem('memLastName')||'';

      const titles=['¡Increíble!','¡Victoria!','¡Bien hecho!','¡Genial!','¡Excelente!'];
      $('winTitle').textContent=accuracy===100?'¡PERFECTO!':titles[Math.floor(Math.random()*titles.length)];

      showScreen('win');
      launchConfetti();

      // Achievements
      checkAchievements(accuracy);
    },600);
  }

  // ============ SAVE SCORE ============
  $('btnSaveScore').addEventListener('click',()=>{
    const name=($('nameInput').value.trim()||'Anónimo').slice(0,15);
    localStorage.setItem('memLastName',name);
    scores[diff].push({name,score,time:fmtTime(timer),moves,date:new Date().toLocaleDateString('es')});
    scores[diff].sort((a,b)=>b.score-a.score);
    if(scores[diff].length>5)scores[diff].length=5;
    localStorage.setItem('memScores',JSON.stringify(scores));
    $('btnSaveScore').textContent='✓ Guardado';$('btnSaveScore').disabled=true;
    setTimeout(()=>{$('btnSaveScore').textContent='Guardar';$('btnSaveScore').disabled=false},2000);
  });

  // ============ RENDER SCORES ============
  function renderScores(){
    const list=scores[scoreDiff]||[];
    const body=$('scoreBody');body.innerHTML='';
    $('noScores').style.display=list.length?'none':'block';
    $('scoreTable').style.display=list.length?'':'none';
    list.forEach((s,i)=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td class="score-rank">${i+1}</td><td class="score-name">${esc(s.name)}</td><td class="score-pts">${s.score}</td><td>${s.time}</td><td>${s.moves}</td>`;
      body.appendChild(tr);
    });
  }

  // ============ ACHIEVEMENTS ============
  function checkAchievements(accuracy){
    const a=stats.achievements;
    const checks=[
      [!a.includes('firstWin'),'firstWin'],
      [accuracy===100&&!a.includes('perfect'),'perfect'],
      [timer<30&&!a.includes('speedrun'),'speedrun'],
      [maxCombo>=4&&!a.includes('combo4'),'combo4'],
      [diff==='hard'&&!a.includes('hardWin'),'hardWin'],
      [stats.gamesPlayed>=10&&!a.includes('tenGames'),'tenGames'],
    ];
    checks.forEach(([cond,key])=>{
      if(cond){a.push(key);localStorage.setItem('memStats',JSON.stringify(stats));setTimeout(()=>showAchievement(key),1200)}
    });
  }

  function showAchievement(key){
    const t=ACHIEVEMENTS[key];if(!t)return;
    $('achieveIcon').textContent=t.split(' ')[0];
    $('achieveText').textContent=t;
    $('achieveToast').classList.add('show');
    setTimeout(()=>$('achieveToast').classList.remove('show'),3500);
  }

  // ============ CONFETTI ============
  function launchConfetti(){
    const colors=['#6c63ff','#ff6b9d','#0ea574','#f59e0b','#e53e3e','#a855f7','#4ecdc4','#ffd740'];
    for(let i=0;i<50;i++){
      const el=document.createElement('div');el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';el.style.top='-10px';
      el.style.background=colors[Math.floor(Math.random()*colors.length)];
      el.style.width=(Math.random()*8+5)+'px';el.style.height=(Math.random()*8+5)+'px';
      el.style.borderRadius=Math.random()>0.5?'50%':'2px';
      document.body.appendChild(el);
      const x=(Math.random()-0.5)*350,dur=Math.random()*1500+1500;
      el.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:`translate(${x}px,${window.innerHeight+50}px) rotate(${Math.random()*720}deg)`,opacity:0}],{duration:dur,easing:'cubic-bezier(0.25,0.46,0.45,0.94)'}).onfinish=()=>el.remove();
    }
  }

  // ============ UTILS ============
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
  function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

  // ============ INIT ============
  applyTheme();
})();
</script>
</body>
</html>
